<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Desenvolvimento - Kelly Studio</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
        }

        /* Ajuste para inputs do tipo number não mostrarem setas */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell 
        } = Recharts;
        
        // Ícones do Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // Estado da calculadora
            const [calcData, setCalcData] = useState(() => {
                const saved = localStorage.getItem('logistics_calc_v3');
                return saved ? JSON.parse(saved) : { pecas: 5000, jornada: 9 };
            });

            // Metas
            const [metas, setMetas] = useState(() => {
                const saved = localStorage.getItem('logistics_metas_v3');
                return saved ? JSON.parse(saved) : { CONFERENTE: 220, AUXILIAR: 110 };
            });

            const generateWeeklyStructure = () => {
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
                return dias.map((dia, index) => ({
                    id: `fixo-${index}`,
                    dia: dia,
                    pecas: 0,
                    conferentes: 0,
                    auxiliares: 0,
                    jornada: 9,
                }));
            };

            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('logistics_data_v3');
                return saved ? JSON.parse(saved) : { atual: generateWeeklyStructure() };
            });

            useEffect(() => {
                localStorage.setItem('logistics_data_v3', JSON.stringify(data));
                localStorage.setItem('logistics_metas_v3', JSON.stringify(metas));
                localStorage.setItem('logistics_calc_v3', JSON.stringify(calcData));
            }, [data, metas, calcData]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser.toUpperCase() === 'CDTO') {
                    setIsAuthenticated(true);
                } else {
                    setLoginError('Utilizador não autorizado.');
                }
            };

            const calculateProdReal = (pecas, qtdPessoas, jornada) => {
                if (qtdPessoas <= 0 || jornada <= 0 || pecas <= 0) return 0;
                return (pecas / qtdPessoas / jornada).toFixed(0);
            };

            const calculateSugerido = (pecas, jornada, meta) => {
                if (pecas <= 0 || jornada <= 0 || meta <= 0) return 0;
                return Math.ceil(pecas / (jornada * meta));
            };

            const updateData = (id, field, value) => {
                const val = field === 'dia' ? value : (value === "" ? 0 : parseFloat(value));
                setData(prev => ({
                    ...prev,
                    atual: prev.atual.map(item => item.id === id ? { ...item, [field]: val } : item)
                }));
            };

            const totalPecasSemana = data.atual.reduce((acc, curr) => acc + curr.pecas, 0);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[2rem] p-10 shadow-2xl">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-red-800 rounded-2xl flex items-center justify-center text-white mb-6 mx-auto">
                                    <Icon name="ArrowRightLeft" size={32} />
                                </div>
                                <h1 className="text-2xl font-black text-slate-900 uppercase">Gestão <span className="text-blue-900">Kelly Studio</span></h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="text" 
                                    placeholder="Introduza CDTO"
                                    className="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-6 font-bold"
                                    onChange={(e) => setLoginUser(e.target.value)}
                                />
                                {loginError && <p className="text-red-600 text-xs text-center font-bold">{loginError}</p>}
                                <button className="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-950 md:relative md:translate-x-0 transition-transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} no-print`}>
                        <div className="p-6">
                            <div className="text-white font-black text-xl mb-10 flex items-center gap-2">
                                <div className="bg-red-800 p-2 rounded-lg"><Icon name="ArrowRightLeft" /></div>
                                <span>Kelly Studio</span>
                            </div>
                            <nav className="space-y-2">
                                {['dashboard', 'input', 'meta', 'calculadora'].map(tab => (
                                    <button 
                                        key={tab}
                                        onClick={() => {setActiveTab(tab); setIsMobileMenuOpen(false);}}
                                        className={`w-full text-left px-4 py-3 rounded-xl font-bold capitalize transition-all ${activeTab === tab ? 'bg-red-800 text-white' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                                <button onClick={() => window.location.reload()} className="w-full text-left px-4 py-3 rounded-xl font-bold text-red-500 mt-10">Sair</button>
                            </nav>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-10">
                        {/* Mobile Header */}
                        <div className="md:hidden flex justify-between items-center mb-6 no-print">
                            <span className="font-black text-blue-900">KELLY STUDIO</span>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-slate-900 text-white rounded-lg">
                                <Icon name={isMobileMenuOpen ? "X" : "Menu"} />
                            </button>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-200 text-center shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Volume Total Semana</p>
                                    <h2 className="text-4xl font-black text-slate-900">{totalPecasSemana.toLocaleString()} pçs</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-6 rounded-[2rem] border-l-4 border-blue-900 shadow-sm">
                                        <p className="text-xs font-black text-blue-900 uppercase">Conferentes</p>
                                        <p className="text-3xl font-black">{metas.CONFERENTE} <span className="text-xs text-slate-400">meta/h</span></p>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] border-l-4 border-red-800 shadow-sm">
                                        <p className="text-xs font-black text-red-800 uppercase">Auxiliares</p>
                                        <p className="text-3xl font-black">{metas.AUXILIAR} <span className="text-xs text-slate-400">meta/h</span></p>
                                    </div>
                                </div>

                                <div className="bg-white p-4 rounded-[2rem] border border-slate-200 h-80">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={data.atual}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="dia" hide />
                                            <Tooltip />
                                            <Bar dataKey="pecas" fill="#1e3a8a" radius={[10, 10, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="bg-white rounded-[2rem] shadow-sm overflow-hidden overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase">
                                        <tr>
                                            <th className="p-4">Dia</th>
                                            <th className="p-4">Volume</th>
                                            <th className="p-4">Conf.</th>
                                            <th className="p-4">Aux.</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {data.atual.map(item => (
                                            <tr key={item.id}>
                                                <td className="p-4 font-bold text-xs">{item.dia}</td>
                                                <td className="p-4"><input type="number" className="w-20 p-2 bg-slate-100 rounded-lg text-center font-bold" value={item.pecas || ''} onChange={(e) => updateData(item.id, 'pecas', e.target.value)} /></td>
                                                <td className="p-4"><input type="number" className="w-16 p-2 bg-blue-50 rounded-lg text-center font-bold" value={item.conferentes || ''} onChange={(e) => updateData(item.id, 'conferentes', e.target.value)} /></td>
                                                <td className="p-4"><input type="number" className="w-16 p-2 bg-red-50 rounded-lg text-center font-bold" value={item.auxiliares || ''} onChange={(e) => updateData(item.id, 'auxiliares', e.target.value)} /></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'meta' && (
                            <div className="max-w-md mx-auto space-y-6">
                                <div className="bg-slate-900 p-8 rounded-[2rem] text-white">
                                    <h3 className="font-black mb-6 text-center">AJUSTAR METAS</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] block mb-2">META CONFERENTE</label>
                                            <input type="number" className="w-full bg-slate-800 p-4 rounded-xl text-center font-black text-blue-400" value={metas.CONFERENTE} onChange={(e) => setMetas({...metas, CONFERENTE: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-[10px] block mb-2">META AUXILIAR</label>
                                            <input type="number" className="w-full bg-slate-800 p-4 rounded-xl text-center font-black text-red-400" value={metas.AUXILIAR} onChange={(e) => setMetas({...metas, AUXILIAR: e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'calculadora' && (
                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">
                                    <h3 className="font-black mb-6 uppercase">Simulador de Equipa</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="number" placeholder="Volume esperado" className="p-4 bg-slate-50 rounded-2xl font-bold" onChange={(e) => setCalcData({...calcData, pecas: e.target.value})} />
                                        <div className="bg-blue-900 p-6 rounded-2xl text-white text-center">
                                            <p className="text-[10px] mb-2">CONFERENTES NECESSÁRIOS</p>
                                            <p className="text-4xl font-black">{calculateSugerido(calcData.pecas, 9, metas.CONFERENTE)}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
