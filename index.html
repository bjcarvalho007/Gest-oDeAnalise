<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Desenvolvimento - Kelly Studio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Ajuste para esconder setas de inputs numéricos */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell 
        } = Recharts;

        // Mapeamento dos ícones do Lucide para uso global
        const { 
            LayoutDashboard, Database, ArrowRightLeft, FileText, PlusCircle, 
            User, LogOut, Target, RotateCcw, Settings2, CalendarDays, 
            TrendingUp, Users, Clock, Printer, Menu, X, Calculator 
        } = lucide;

        // Componente auxiliar para renderizar ícones
        const LucideIcon = ({ icon: IconComponent, size = 20, className = "", strokeWidth = 2 }) => {
            return <IconComponent size={size} className={className} strokeWidth={strokeWidth} />;
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const [calcData, setCalcData] = useState({ pecas: 5000, jornada: 9 });

            const [metas, setMetas] = useState(() => {
                const savedMetas = localStorage.getItem('logistics_metas_v3');
                if (savedMetas) return JSON.parse(savedMetas);
                return { CONFERENTE: 220, AUXILIAR: 110 };
            });

            const generateWeeklyStructure = () => {
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
                return dias.map((dia, index) => ({
                    id: `fixo-${index}`,
                    dia: dia,
                    pecas: 0,
                    conferentes: 0,
                    auxiliares: 0,
                    jornada: 9,
                }));
            };

            const [data, setData] = useState(() => {
                const savedData = localStorage.getItem('logistics_data_v3');
                if (savedData) return JSON.parse(savedData);
                return { atual: generateWeeklyStructure() };
            });

            useEffect(() => {
                localStorage.setItem('logistics_data_v3', JSON.stringify(data));
                localStorage.setItem('logistics_metas_v3', JSON.stringify(metas));
            }, [data, metas]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser.toUpperCase() === 'CDTO') {
                    setIsAuthenticated(true);
                    setLoginError('');
                } else {
                    setLoginError('Utilizador não autorizado.');
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setLoginUser('');
            };

            const resetWeek = () => {
                if (window.confirm('Deseja limpar todos os dados e reiniciar a semana?')) {
                    setData({ atual: generateWeeklyStructure() });
                }
            };

            const updateData = (id, field, value) => {
                const val = field === 'dia' ? value : (value === "" ? 0 : parseFloat(value));
                setData(prev => ({
                    ...prev,
                    atual: prev.atual.map(item => item.id === id ? { ...item, [field]: val } : item)
                }));
            };

            const calculateProdReal = (pecas, qtdPessoas, jornada) => {
                if (qtdPessoas <= 0 || jornada <= 0 || pecas <= 0) return 0;
                return (pecas / qtdPessoas / jornada).toFixed(0);
            };

            const calculateSugerido = (pecas, jornada, meta) => {
                if (pecas <= 0 || jornada <= 0 || meta <= 0) return 0;
                return Math.ceil(pecas / (jornada * meta));
            };

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
                { id: 'input', label: 'Lançar Dados', icon: PlusCircle },
                { id: 'meta', label: 'Análise de Metas', icon: Target },
                { id: 'calculadora', label: 'Calculadora HC', icon: Calculator }, 
                { id: 'atual', label: 'Histórico', icon: CalendarDays },
            ];

            const totalPecasSemana = data.atual.reduce((acc, curr) => acc + curr.pecas, 0);
            const diasAtivos = data.atual.filter(i => i.pecas > 0).length || 1;
            const mediaRealConf = (data.atual.filter(i => i.pecas > 0).reduce((acc, curr) => acc + parseFloat(calculateProdReal(curr.pecas, curr.conferentes, curr.jornada)), 0) / diasAtivos).toFixed(0);
            const mediaRealAux = (data.atual.filter(i => i.pecas > 0).reduce((acc, curr) => acc + parseFloat(calculateProdReal(curr.pecas, curr.auxiliares, curr.jornada)), 0) / diasAtivos).toFixed(0);
            const mediaSugeridaConf = Math.ceil(data.atual.reduce((acc, curr) => acc + calculateSugerido(curr.pecas, curr.jornada, metas.CONFERENTE), 0) / diasAtivos);
            const mediaSugeridaAux = Math.ceil(data.atual.reduce((acc, curr) => acc + calculateSugerido(curr.pecas, curr.jornada, metas.AUXILIAR), 0) / diasAtivos);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[2rem] p-10 shadow-2xl">
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-16 h-16 bg-red-800 rounded-2xl flex items-center justify-center text-white mb-6">
                                    <LucideIcon icon={ArrowRightLeft} size={32} strokeWidth={2.5} />
                                </div>
                                <h1 className="text-3xl font-black text-slate-900">Kelly <span className="text-blue-900">Studio</span></h1>
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Gestão de Desenvolvimento</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="text" 
                                    value={loginUser}
                                    onChange={(e) => setLoginUser(e.target.value)}
                                    placeholder="Utilizador (CDTO)"
                                    className="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-6 font-bold outline-none focus:ring-4 focus:ring-red-50"
                                />
                                {loginError && <p className="text-red-800 text-[10px] font-bold text-center uppercase">{loginError}</p>}
                                <button type="submit" className="w-full bg-blue-800 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-red-800 transition-all">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8FAFC] flex flex-col md:flex-row text-slate-900 overflow-x-hidden">
                    <style>{`@media print { .no-print { display: none !important; } }`}</style>
                    
                    {/* Top Bar Mobile */}
                    <div className="md:hidden flex items-center justify-between p-4 bg-slate-950 text-white no-print sticky top-0 z-[60]">
                        <span className="font-bold">Kelly Studio</span>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-slate-900 rounded-lg">
                            <LucideIcon icon={isMobileMenuOpen ? X : Menu} size={24}/>
                        </button>
                    </div>

                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-950 transform transition-transform md:relative md:translate-x-0 no-print ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="h-full flex flex-col p-6">
                            <div className="text-white font-black text-xl mb-10 flex items-center gap-3">
                                <div className="p-2 bg-red-800 rounded-lg"><LucideIcon icon={ArrowRightLeft} size={20} /></div>
                                <span>Kelly Studio</span>
                            </div>
                            <nav className="flex-1 space-y-2">
                                {navItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-red-800 text-white' : 'text-slate-500 hover:text-white'}`}
                                    >
                                        <LucideIcon icon={item.icon} size={20} />
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="mt-auto pt-6 border-t border-slate-800 space-y-2">
                                <button onClick={resetWeek} className="w-full flex items-center gap-3 px-5 py-3 rounded-xl text-[10px] font-black uppercase text-amber-600 hover:bg-amber-500/10 transition-all">
                                    <LucideIcon icon={RotateCcw} size={16} /> Limpar Dados
                                </button>
                                <button onClick={handleLogout} className="w-full flex items-center gap-3 px-5 py-3 rounded-xl text-[10px] font-black uppercase text-red-500 hover:bg-red-500/10 transition-all">
                                    <LucideIcon icon={LogOut} size={16} /> Sair
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-12 max-w-[1400px] mx-auto w-full">
                        <header className="mb-12 text-center flex flex-col items-center">
                            <h1 className="text-3xl font-black uppercase tracking-tight">{navItems.find(n => n.id === activeTab)?.label}</h1>
                            <button onClick={() => window.print()} className="mt-6 no-print bg-blue-900 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase shadow-lg hover:bg-red-800 transition-all">
                                <LucideIcon icon={Printer} size={16} className="inline mr-2" /> Exportar Relatório PDF
                            </button>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-in fade-in duration-500">
                                <div className="bg-white p-8 rounded-[2rem] border shadow-sm text-center relative overflow-hidden group">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Volume Total da Semana</p>
                                    <p className="text-5xl font-black text-slate-900">{totalPecasSemana.toLocaleString()} <span className="text-xs">pçs</span></p>
                                    <LucideIcon icon={Database} size={60} className="absolute -right-2 -bottom-2 text-slate-50 group-hover:text-slate-100 transition-colors" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-[2.5rem] border-l-8 border-blue-900 border shadow-sm">
                                        <p className="text-[10px] font-black text-blue-900 uppercase mb-4">Conferente Performance</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-bold text-slate-400 uppercase">Meta</p>
                                                <p className="text-2xl font-black text-blue-900">{metas.CONFERENTE}</p>
                                            </div>
                                            <div className="bg-blue-900 p-4 rounded-2xl text-center text-white shadow-lg">
                                                <p className="text-[8px] font-bold text-blue-200 uppercase">Real</p>
                                                <p className="text-2xl font-black">{mediaRealConf}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] border-l-8 border-red-800 border shadow-sm">
                                        <p className="text-[10px] font-black text-red-800 uppercase mb-4">Auxiliar Performance</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                                <p className="text-[8px] font-bold text-slate-400 uppercase">Meta</p>
                                                <p className="text-2xl font-black text-red-800">{metas.AUXILIAR}</p>
                                            </div>
                                            <div className="bg-red-800 p-4 rounded-2xl text-center text-white shadow-lg">
                                                <p className="text-[8px] font-bold text-red-100 uppercase">Real</p>
                                                <p className="text-2xl font-black">{mediaRealAux}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-4 md:p-8 rounded-[2.5rem] border shadow-sm h-[400px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={data.atual}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                            <XAxis dataKey="dia" tick={{fontSize: 9, fontWeight: 'bold'}} />
                                            <YAxis tick={{fontSize: 9}} />
                                            <Tooltip contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}} />
                                            <Bar dataKey={(d) => calculateProdReal(d.pecas, d.conferentes, d.jornada)} fill="#1E3A8A" name="Conf." radius={[4,4,0,0]} />
                                            <Bar dataKey={(d) => calculateProdReal(d.pecas, d.auxiliares, d.jornada)} fill="#991B1B" name="Aux." radius={[4,4,0,0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="bg-white rounded-[2rem] border shadow-xl overflow-hidden animate-in slide-in-from-bottom-4 duration-500">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead>
                                            <tr className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                                                <th className="p-6">Dia</th>
                                                <th className="p-4 text-center">Volume</th>
                                                <th className="p-4 text-center">Jornada</th>
                                                <th className="p-4 text-center">Qtd Conf.</th>
                                                <th className="p-4 text-center">Qtd Aux.</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {data.atual.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-6 font-black text-[10px] uppercase text-slate-500">{item.dia}</td>
                                                    <td className="p-4"><input type="number" className="w-full p-3 bg-slate-100 rounded-xl text-center font-black text-sm" value={item.pecas || ''} onChange={(e) => updateData(item.id, 'pecas', e.target.value)} /></td>
                                                    <td className="p-4"><input type="number" step="0.5" className="w-full p-3 bg-amber-50 rounded-xl text-center font-black text-amber-800" value={item.jornada || ''} onChange={(e) => updateData(item.id, 'jornada', e.target.value)} /></td>
                                                    <td className="p-4"><input type="number" className="w-full p-3 bg-blue-50 rounded-xl text-center font-black text-blue-900" value={item.conferentes || ''} onChange={(e) => updateData(item.id, 'conferentes', e.target.value)} /></td>
                                                    <td className="p-4"><input type="number" className="w-full p-3 bg-red-50 rounded-xl text-center font-black text-red-900" value={item.auxiliares || ''} onChange={(e) => updateData(item.id, 'auxiliares', e.target.value)} /></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'meta' && (
                            <div className="bg-slate-950 p-10 rounded-[2rem] shadow-2xl text-center text-white space-y-10">
                                <h2 className="text-[10px] font-black uppercase tracking-widest opacity-50 flex items-center justify-center gap-2">
                                    <LucideIcon icon={Settings2} size={18} className="text-red-700" /> Configuração de Metas
                                </h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 max-w-2xl mx-auto">
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Meta Conferente (pç/h)</p>
                                        <input type="number" value={metas.CONFERENTE} onChange={(e) => setMetas({...metas, CONFERENTE: parseFloat(e.target.value) || 0})} className="w-full bg-slate-900 p-6 rounded-2xl text-3xl font-black text-blue-700 text-center outline-none border border-slate-800 focus:border-blue-900" />
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Meta Auxiliar (pç/h)</p>
                                        <input type="number" value={metas.AUXILIAR} onChange={(e) => setMetas({...metas, AUXILIAR: parseFloat(e.target.value) || 0})} className="w-full bg-slate-900 p-6 rounded-2xl text-3xl font-black text-red-800 text-center outline-none border border-slate-800 focus:border-red-900" />
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'calculadora' && (
                            <div className="bg-white p-12 rounded-[3rem] border shadow-2xl animate-in slide-in-from-top-4 duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div className="space-y-8">
                                        <div>
                                            <h2 className="text-2xl font-black text-slate-900 uppercase leading-none">Simulador de <span className="text-red-800">Necessidade</span></h2>
                                            <p className="text-slate-400 text-sm mt-2 font-medium">Calcule o Headcount ideal para o volume planeado.</p>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 block">Volume Previsto</label>
                                                <input type="number" value={calcData.pecas} onChange={(e) => setCalcData({...calcData, pecas: parseFloat(e.target.value) || 0})} className="w-full bg-slate-50 border p-5 rounded-2xl font-black text-2xl outline-none focus:ring-4 focus:ring-blue-50" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 block">Horas de Operação</label>
                                                <input type="number" step="0.5" value={calcData.jornada} onChange={(e) => setCalcData({...calcData, jornada: parseFloat(e.target.value) || 0})} className="w-full bg-slate-50 border p-5 rounded-2xl font-black text-2xl outline-none focus:ring-4 focus:ring-amber-50" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-6">
                                        <div className="bg-blue-900 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-blue-900/20 text-center flex flex-col justify-center">
                                            <p className="text-[10px] font-black uppercase opacity-60 mb-2">Conferentes Necessários</p>
                                            <p className="text-7xl font-black">{calculateSugerido(calcData.pecas, calcData.jornada, metas.CONFERENTE)}</p>
                                            <p className="text-[10px] font-bold uppercase mt-4">Meta: {metas.CONFERENTE} pç/h</p>
                                        </div>
                                        <div className="bg-red-800 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-red-900/20 text-center flex flex-col justify-center">
                                            <p className="text-[10px] font-black uppercase opacity-60 mb-2">Auxiliares Necessários</p>
                                            <p className="text-7xl font-black">{calculateSugerido(calcData.pecas, calcData.jornada, metas.AUXILIAR)}</p>
                                            <p className="text-[10px] font-bold uppercase mt-4">Meta: {metas.AUXILIAR} pç/h</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'atual' && (
                            <div className="bg-white rounded-[2.5rem] border shadow-xl overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                                            <tr>
                                                <th className="p-6">Dia</th>
                                                <th className="p-4 text-center">Peças</th>
                                                <th className="p-4 text-center">Status Meta</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {data.atual.map(item => {
                                                const prodConf = calculateProdReal(item.pecas, item.conferentes, item.jornada);
                                                const ok = parseFloat(prodConf) >= metas.CONFERENTE && item.pecas > 0;
                                                return (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-6 font-black text-[10px] uppercase text-slate-500">{item.dia}</td>
                                                        <td className="p-4 text-center font-bold">{item.pecas.toLocaleString()}</td>
                                                        <td className="p-4 text-center">
                                                            <span className={`px-4 py-1.5 rounded-full text-[8px] font-black uppercase tracking-widest ${ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}`}>
                                                                {ok ? 'Meta Atingida' : 'Abaixo da Meta'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
