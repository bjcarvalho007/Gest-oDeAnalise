<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDTO | Gestão Integrada</title>
    
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- UI & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #1e3a8a;
            --accent: #991b1b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
        }

        .glass-card {
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .sidebar-item-active {
            background-color: #991b1b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(153, 27, 27, 0.3);
        }

        .day-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-minimal {
            background: #f1f5f9;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .input-minimal:focus {
            background: white;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        @media print {
            .no-print { display: none !important; }
            main { padding: 0 !important; width: 100% !important; }
            .grid { display: block !important; }
            .day-card { break-inside: avoid; margin-bottom: 20px; border: 1px solid #ddd !important; }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-flex' }}></i>;
        };

        const App = () => {
            const [isAuth, setIsAuth] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const [metas, setMetas] = useState(() => {
                const saved = localStorage.getItem('logistics_metas_v3');
                return saved ? JSON.parse(saved) : { CONFERENTE: 220, AUXILIAR: 110 };
            });

            const generateWeeklyStructure = () => {
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
                return dias.map((dia, index) => ({
                    id: `fixo-${index}`,
                    dia: dia,
                    pecas: 0,
                    conferentes: 0,
                    auxiliares: 0,
                    jornada: 9,
                }));
            };

            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('logistics_data_v3');
                return saved ? JSON.parse(saved) : { atual: generateWeeklyStructure() };
            });

            const [calcData, setCalcData] = useState({ pecas: 5000, jornada: 9 });

            useEffect(() => {
                localStorage.setItem('logistics_data_v3', JSON.stringify(data));
                localStorage.setItem('logistics_metas_v3', JSON.stringify(metas));
            }, [data, metas]);

            const calculateProdReal = (pecas, qtdPessoas, jornada) => {
                if (!qtdPessoas || !jornada || !pecas) return 0;
                return Math.round(pecas / qtdPessoas / jornada);
            };

            const calculateSugerido = (pecas, jornada, meta) => {
                if (!pecas || !jornada || !meta) return 0;
                return Math.ceil(pecas / (jornada * meta));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser.toUpperCase() === 'CDTO') setIsAuth(true);
                else alert('Utilizador não autorizado.');
            };

            const resetWeek = () => {
                if (confirm('Deseja limpar todos os dados e reiniciar a semana?')) {
                    setData({ atual: generateWeeklyStructure() });
                }
            };

            const updateDataField = (id, field, value) => {
                const val = field === 'dia' ? value : (value === "" ? 0 : parseFloat(value));
                setData(prev => ({
                    ...prev,
                    atual: prev.atual.map(item => item.id === id ? { ...item, [field]: val } : item)
                }));
            };

            const totalPecasSemana = data.atual.reduce((acc, curr) => acc + (Number(curr.pecas) || 0), 0);
            const diasAtivos = data.atual.filter(i => i.pecas > 0).length || 1;
            
            const mediaRealConf = Math.round(data.atual.filter(i => i.pecas > 0).reduce((acc, curr) => acc + calculateProdReal(curr.pecas, curr.conferentes, curr.jornada), 0) / diasAtivos);
            const mediaRealAux = Math.round(data.atual.filter(i => i.pecas > 0).reduce((acc, curr) => acc + calculateProdReal(curr.pecas, curr.auxiliares, curr.jornada), 0) / diasAtivos);

            if (!isAuth) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                        <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-900 via-red-800 to-blue-900"></div>
                            <div className="text-center mb-10">
                                <div className="w-16 h-16 bg-red-800 rounded-2xl flex items-center justify-center text-white mb-6 shadow-xl mx-auto">
                                    <Icon name="arrow-right-left" size={32} />
                                </div>
                                <h1 className="text-2xl font-black text-slate-900 tracking-tight uppercase">Gestão <span className="text-blue-900">Desenvolvimento</span></h1>
                                <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mt-2">Análise de Entrada</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2 block">Utilizador</label>
                                    <input 
                                        type="text" 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-6 font-bold text-center text-xl outline-none focus:ring-4 focus:ring-red-50 transition-all uppercase"
                                        value={loginUser}
                                        onChange={(e) => setLoginUser(e.target.value)}
                                        placeholder="LOGIN"
                                    />
                                </div>
                                <button className="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-800 active:scale-95 transition-all">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, AreaChart, Area, Legend } = window.Recharts || {};

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-950 text-white transition-transform duration-300 md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} no-print`}>
                        <div className="p-8 h-full flex flex-col">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="bg-red-800 p-2 rounded-lg text-white"><Icon name="arrow-right-left" size={20} /></div>
                                <span className="font-black text-lg tracking-tighter uppercase">Gestão <span className="text-blue-700">Dev</span></span>
                            </div>

                            <nav className="flex-1 space-y-2">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                                    { id: 'input', label: 'Gestão Operacional', icon: 'zap' },
                                    { id: 'meta', label: 'Análise de Metas', icon: 'target' },
                                    { id: 'calculadora', label: 'Calculadora HC', icon: 'calculator' }
                                ].map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => { setActiveTab(item.id); setIsMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'sidebar-item-active' : 'text-slate-500 hover:bg-slate-900 hover:text-white'}`}
                                    >
                                        <Icon name={item.icon} size={18} /> {item.label}
                                    </button>
                                ))}
                            </nav>

                            <div className="pt-6 border-t border-slate-800 space-y-3">
                                <button onClick={resetWeek} className="w-full flex items-center gap-3 px-2 py-2 text-[10px] font-black uppercase text-amber-500 hover:bg-amber-500/10 transition-all">
                                    <Icon name="rotate-ccw" size={14} /> Limpar Semana
                                </button>
                                <button onClick={() => window.location.reload()} className="w-full flex items-center gap-3 px-2 py-2 text-[10px] font-black uppercase text-red-500 hover:bg-red-500/10 transition-all">
                                    <Icon name="log-out" size={14} /> Encerrar Sessão
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 min-w-0 overflow-y-auto max-h-screen bg-[#f8fafc]">
                        {/* MOBILE HEADER */}
                        <div className="md:hidden bg-slate-950 text-white p-4 flex justify-between items-center no-print">
                            <span className="font-black text-sm uppercase tracking-tighter">Gestão Operacional</span>
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 bg-slate-900 rounded-lg">
                                <Icon name={isMobileMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>

                        <div className="p-6 lg:p-12 max-w-7xl mx-auto">
                            <header className="mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-center md:text-left">
                                    <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tight">
                                        {activeTab === 'dashboard' ? 'Sumário Executivo' : 
                                         activeTab === 'input' ? 'Painel de Operações' : 
                                         activeTab === 'meta' ? 'Planeamento de Metas' : 'Simulador Headcount'}
                                    </h1>
                                    <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">CDTO • Sistema de Alta Performance</p>
                                </div>
                                <button onClick={() => window.print()} className="bg-blue-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center gap-2 hover:bg-red-800 transition-all shadow-lg no-print">
                                    <Icon name="printer" size={16} /> Exportar Relatório
                                </button>
                            </header>

                            {/* --- DASHBOARD DETALHADO --- */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    {/* Principais Métricas em Cards Slim */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Volume Total</p>
                                            <div className="flex items-end justify-between">
                                                <h3 className="text-3xl font-black text-slate-900">{totalPecasSemana.toLocaleString()}</h3>
                                                <span className="text-[10px] font-bold text-slate-400 mb-1">PÇS</span>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-blue-900">
                                            <p className="text-[10px] font-black text-blue-900 uppercase mb-1">Prod. Conferente</p>
                                            <div className="flex items-end justify-between">
                                                <h3 className="text-3xl font-black text-slate-900">{mediaRealConf}</h3>
                                                <div className={`px-2 py-1 rounded-lg text-[9px] font-black ${mediaRealConf >= metas.CONFERENTE ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                    {Math.round((mediaRealConf/metas.CONFERENTE)*100)}%
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm border-l-4 border-l-red-800">
                                            <p className="text-[10px] font-black text-red-800 uppercase mb-1">Prod. Auxiliar</p>
                                            <div className="flex items-end justify-between">
                                                <h3 className="text-3xl font-black text-slate-900">{mediaRealAux}</h3>
                                                <div className={`px-2 py-1 rounded-lg text-[9px] font-black ${mediaRealAux >= metas.AUXILIAR ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                    {Math.round((mediaRealAux/metas.AUXILIAR)*100)}%
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Dias Registados</p>
                                            <div className="flex items-end justify-between">
                                                <h3 className="text-3xl font-black text-slate-900">{diasAtivos}</h3>
                                                <Icon name="calendar" size={20} className="text-slate-200 mb-1" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Gráfico de Evolução Semanal */}
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                            <div className="flex justify-between items-center mb-8">
                                                <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                                                    <Icon name="bar-chart-2" className="text-blue-900"/> Desempenho Operacional vs Metas
                                                </h3>
                                            </div>
                                            <div className="h-[300px]">
                                                {BarChart && (
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <BarChart data={data.atual} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                                            <XAxis dataKey="dia" axisLine={false} tickLine={false} tick={{fontSize: 9, fontWeight: 700}} />
                                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 9}} />
                                                            <Tooltip 
                                                                cursor={{fill: '#f8fafc'}}
                                                                contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)'}} 
                                                            />
                                                            <Legend wrapperStyle={{fontSize: '10px', fontWeight: 'bold', textTransform: 'uppercase', paddingTop: '20px'}} />
                                                            <Bar name="Real Conf." dataKey={(d) => calculateProdReal(d.pecas, d.conferentes, d.jornada)} fill="#1E3A8A" radius={[4, 4, 0, 0]} />
                                                            <Bar name="Real Aux." dataKey={(d) => calculateProdReal(d.pecas, d.auxiliares, d.jornada)} fill="#991B1B" radius={[4, 4, 0, 0]} />
                                                        </BarChart>
                                                    </ResponsiveContainer>
                                                )}
                                            </div>
                                        </div>

                                        {/* Tabela de Detalhes no Dashboard */}
                                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                            <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-6">Status por Dia</h3>
                                            <div className="space-y-4">
                                                {data.atual.map(dia => {
                                                    const prod = calculateProdReal(dia.pecas, dia.conferentes, dia.jornada);
                                                    const isOk = prod >= metas.CONFERENTE;
                                                    const isZero = dia.pecas === 0;
                                                    
                                                    return (
                                                        <div key={dia.id} className="flex items-center justify-between p-3 rounded-2xl bg-slate-50">
                                                            <div>
                                                                <p className="text-[10px] font-black text-slate-800 uppercase">{dia.dia.split('-')[0]}</p>
                                                                <p className="text-[9px] font-bold text-slate-400">{dia.pecas.toLocaleString()} PÇS</p>
                                                            </div>
                                                            <div className="text-right">
                                                                <p className={`text-sm font-black ${isZero ? 'text-slate-300' : (isOk ? 'text-green-600' : 'text-red-600')}`}>
                                                                    {isZero ? '--' : prod}
                                                                </p>
                                                                {!isZero && <p className="text-[8px] font-bold text-slate-400">PÇ/H</p>}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Rodapé do Dashboard com Sugestões de Headcount para o Volume Médio */}
                                    <div className="bg-slate-900 rounded-[2.5rem] p-10 text-white">
                                        <div className="flex flex-col md:flex-row items-center justify-between gap-8">
                                            <div className="text-center md:text-left">
                                                <h3 className="text-xl font-black uppercase mb-2">Simulação Rápida</h3>
                                                <p className="text-slate-400 text-xs font-medium">Baseado na média semanal atual de volume por dia.</p>
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 min-w-[140px] text-center">
                                                    <p className="text-[9px] font-black text-blue-400 uppercase mb-1">Conf. Necessários</p>
                                                    <p className="text-3xl font-black">{calculateSugerido(totalPecasSemana/diasAtivos, 9, metas.CONFERENTE)}</p>
                                                </div>
                                                <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 min-w-[140px] text-center">
                                                    <p className="text-[9px] font-black text-red-400 uppercase mb-1">Aux. Necessários</p>
                                                    <p className="text-3xl font-black">{calculateSugerido(totalPecasSemana/diasAtivos, 9, metas.AUXILIAR)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- GESTÃO OPERACIONAL (CARDS) --- */}
                            {activeTab === 'input' && (
                                <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 no-print">
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center gap-5">
                                            <div className="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-900"><Icon name="layers" size={24}/></div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Volume Semanal</p>
                                                <p className="text-xl font-black">{totalPecasSemana.toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center gap-5">
                                            <div className="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center text-red-900"><Icon name="activity" size={24}/></div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Média Real (H)</p>
                                                <p className="text-xl font-black">{mediaRealConf} <span className="text-[10px] text-slate-300">PÇ/H</span></p>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 flex items-center gap-5">
                                            <div className="w-14 h-14 bg-amber-100 rounded-2xl flex items-center justify-center text-amber-900"><Icon name="calendar-check" size={24}/></div>
                                            <div>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Dias Ativos</p>
                                                <p className="text-xl font-black">{diasAtivos} <span className="text-[10px] text-slate-300">DIAS</span></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {data.atual.map(item => {
                                            const prodC = calculateProdReal(item.pecas, item.conferentes, item.jornada);
                                            const prodA = calculateProdReal(item.pecas, item.auxiliares, item.jornada);
                                            const hasData = item.pecas > 0;
                                            const confOk = prodC >= metas.CONFERENTE;
                                            const auxOk = prodA >= metas.AUXILIAR;
                                            const allOk = confOk && auxOk;

                                            return (
                                                <div key={item.id} className={`day-card bg-white rounded-[2.5rem] border overflow-hidden shadow-sm relative ${hasData ? (allOk ? 'border-green-200' : 'border-red-200') : 'border-slate-200 hover:shadow-md'}`}>
                                                    <div className={`p-6 flex justify-between items-center ${hasData ? (allOk ? 'bg-green-50' : 'bg-red-50') : 'bg-slate-50'}`}>
                                                        <div>
                                                            <h3 className="font-black text-sm uppercase text-slate-800">{item.dia}</h3>
                                                            {hasData && (
                                                                <span className={`text-[9px] font-black uppercase ${allOk ? 'text-green-600' : 'text-red-600'}`}>
                                                                    {allOk ? 'Meta Atingida' : 'Abaixo da Meta'}
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${hasData ? (allOk ? 'bg-green-600 text-white' : 'bg-red-600 text-white') : 'bg-slate-200 text-slate-400'}`}>
                                                            <Icon name={hasData ? (allOk ? "check" : "alert-triangle") : "circle"} size={20} />
                                                        </div>
                                                    </div>

                                                    <div className="p-6 space-y-4">
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div className="space-y-1">
                                                                <label className="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Pecas (Volume)</label>
                                                                <input 
                                                                    type="number" 
                                                                    className="w-full p-3 input-minimal rounded-xl font-black text-center text-slate-700"
                                                                    value={item.pecas || ''} 
                                                                    onChange={(e) => updateDataField(item.id, 'pecas', e.target.value)} 
                                                                />
                                                            </div>
                                                            <div className="space-y-1">
                                                                <label className="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">Jornada (Horas)</label>
                                                                <input 
                                                                    type="number" 
                                                                    step="0.5"
                                                                    className="w-full p-3 input-minimal rounded-xl font-black text-center text-amber-700"
                                                                    value={item.jornada || ''} 
                                                                    onChange={(e) => updateDataField(item.id, 'jornada', e.target.value)} 
                                                                />
                                                            </div>
                                                        </div>

                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div className="space-y-1">
                                                                <label className="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">HC Conferentes</label>
                                                                <input 
                                                                    type="number" 
                                                                    className="w-full p-3 input-minimal rounded-xl font-black text-center text-blue-900"
                                                                    value={item.conferentes || ''} 
                                                                    onChange={(e) => updateDataField(item.id, 'conferentes', e.target.value)} 
                                                                />
                                                            </div>
                                                            <div className="space-y-1">
                                                                <label className="text-[8px] font-black text-slate-400 uppercase tracking-widest ml-1">HC Auxiliares</label>
                                                                <input 
                                                                    type="number" 
                                                                    className="w-full p-3 input-minimal rounded-xl font-black text-center text-red-800"
                                                                    value={item.auxiliares || ''} 
                                                                    onChange={(e) => updateDataField(item.id, 'auxiliares', e.target.value)} 
                                                                />
                                                            </div>
                                                        </div>

                                                        {hasData && (
                                                            <div className="pt-4 border-t border-slate-100 flex items-center justify-between">
                                                                <div className="text-center flex-1">
                                                                    <p className="text-[8px] font-bold text-slate-400 uppercase mb-1">Real Conf.</p>
                                                                    <p className={`text-lg font-black ${confOk ? 'text-blue-900' : 'text-red-500'}`}>{prodC}</p>
                                                                </div>
                                                                <div className="w-px h-8 bg-slate-100"></div>
                                                                <div className="text-center flex-1">
                                                                    <p className="text-[8px] font-bold text-slate-400 uppercase mb-1">Real Aux.</p>
                                                                    <p className={`text-lg font-black ${auxOk ? 'text-red-900' : 'text-red-500'}`}>{prodA}</p>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* --- CALCULADORA --- */}
                            {activeTab === 'calculadora' && (
                                <div className="max-w-4xl mx-auto animate-in zoom-in-95 duration-500">
                                    <div className="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                                        <div className="space-y-8">
                                            <h2 className="text-2xl font-black uppercase text-slate-800 leading-tight">Simulador de<br/><span className="text-red-800">Necessidade (HC)</span></h2>
                                            <div className="space-y-6">
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Volume Previsto</label>
                                                    <input type="number" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-3xl focus:border-blue-900 outline-none transition-all" value={calcData.pecas} onChange={(e) => setCalcData({...calcData, pecas: Number(e.target.value)})} />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-1">Horas Operacionais</label>
                                                    <input type="number" step="0.5" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-3xl focus:border-blue-900 outline-none transition-all" value={calcData.jornada} onChange={(e) => setCalcData({...calcData, jornada: Number(e.target.value)})} />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="bg-blue-900 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-blue-900/30 text-center transform hover:scale-105 transition-transform">
                                                <p className="text-[10px] font-bold uppercase opacity-60 mb-2">Sugerido Conferentes</p>
                                                <p className="text-7xl font-black">{calculateSugerido(calcData.pecas, calcData.jornada, metas.CONFERENTE)}</p>
                                            </div>
                                            <div className="bg-red-800 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-red-900/30 text-center transform hover:scale-105 transition-transform">
                                                <p className="text-[10px] font-bold uppercase opacity-60 mb-2">Sugerido Auxiliares</p>
                                                <p className="text-7xl font-black">{calculateSugerido(calcData.pecas, calcData.jornada, metas.AUXILIAR)}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- CONFIGURAÇÃO DE METAS --- */}
                            {activeTab === 'meta' && (
                                <div className="max-w-2xl mx-auto animate-in fade-in duration-500">
                                    <div className="bg-slate-950 p-12 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                                        <div className="text-center mb-12">
                                            <Icon name="settings-2" size={32} className="text-red-700 mx-auto mb-4" />
                                            <h2 className="text-xl font-extrabold uppercase tracking-widest">Configuração de Metas</h2>
                                            <p className="text-slate-500 text-[10px] font-bold mt-2 uppercase">Alvos de Produtividade / Hora</p>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-10">
                                            <div className="space-y-3 text-center">
                                                <label className="text-[10px] font-black uppercase text-blue-500 tracking-widest">Conferência</label>
                                                <input type="number" className="w-full bg-slate-900 border-2 border-slate-800 p-8 rounded-3xl text-5xl font-black text-white text-center outline-none focus:border-blue-900 transition-all" value={metas.CONFERENTE} onChange={(e) => setMetas({...metas, CONFERENTE: Number(e.target.value)})} />
                                            </div>
                                            <div className="space-y-3 text-center">
                                                <label className="text-[10px] font-black uppercase text-red-600 tracking-widest">Auxiliares</label>
                                                <input type="number" className="w-full bg-slate-900 border-2 border-slate-800 p-8 rounded-3xl text-5xl font-black text-white text-center outline-none focus:border-red-800 transition-all" value={metas.AUXILIAR} onChange={(e) => setMetas({...metas, AUXILIAR: Number(e.target.value)})} />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const init = () => {
            const rootElement = document.getElementById('root');
            if (rootElement) {
                const root = ReactDOM.createRoot(rootElement);
                root.render(<App />);
            }
        };

        window.onload = () => {
            if (typeof Recharts === 'undefined' || typeof lucide === 'undefined') {
                setTimeout(init, 500);
            } else {
                init();
            }
        };
    </script>
</body>
</html>
