<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Desenvolvimento</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Ocultar elementos na impressão */
        @media print {
            .no-print { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
            .print-card { box-shadow: none !important; border: 1px solid #ddd !important; }
        }

        /* Esconder setas do input number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell 
        } = Recharts;

        // Componente de Ícone Dinâmico
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [calcData, setCalcData] = useState({ pecas: 5000, jornada: 9 });

            // Metas Persistentes
            const [metas, setMetas] = useState(() => {
                const saved = localStorage.getItem('gestao_metas_v1');
                return saved ? JSON.parse(saved) : { CONFERENTE: 220, AUXILIAR: 110 };
            });

            // Dados Semanais
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('gestao_dados_v1');
                if (saved) return JSON.parse(saved);
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
                return { 
                    atual: dias.map((dia, i) => ({ id: i, dia, pecas: 0, conferentes: 0, auxiliares: 0, jornada: 9 })) 
                };
            });

            useEffect(() => {
                localStorage.setItem('gestao_dados_v1', JSON.stringify(data));
                localStorage.setItem('gestao_metas_v1', JSON.stringify(metas));
                lucide.createIcons();
            }, [data, metas, isAuthenticated, activeTab]);

            // Cálculos
            const calculateProdReal = (pecas, qtd, jornada) => (qtd > 0 && jornada > 0) ? (pecas / qtd / jornada).toFixed(0) : 0;
            const calculateSugerido = (pecas, jornada, meta) => (pecas > 0 && jornada > 0) ? Math.ceil(pecas / (jornada * meta)) : 0;

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser.toUpperCase() === 'CDTO') setIsAuthenticated(true);
                else setLoginError('Acesso negado');
            };

            const totalPecas = data.atual.reduce((acc, curr) => acc + curr.pecas, 0);

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                        <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
                            <div className="flex flex-col items-center mb-10">
                                <div className="bg-red-800 p-4 rounded-2xl text-white mb-4">
                                    <LucideIcon name="arrow-right-left" size={32} />
                                </div>
                                <h1 className="text-2xl font-black text-slate-900 uppercase tracking-tighter">
                                    Gestão <span className="text-blue-900">De Desenvolvimento</span>
                                </h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 ml-1">Utilizador</label>
                                    <input 
                                        type="text" 
                                        placeholder="Digite CDTO" 
                                        className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-blue-900 transition-all"
                                        onChange={(e) => setLoginUser(e.target.value)}
                                    />
                                </div>
                                {loginError && <p className="text-red-600 text-xs font-black text-center uppercase tracking-widest">{loginError}</p>}
                                <button className="w-full bg-blue-900 text-white py-5 rounded-2xl font-black uppercase shadow-lg hover:bg-blue-800 active:scale-95 transition-all">Entrar</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar Móvel Topo */}
                    <div className="md:hidden bg-slate-950 p-4 flex justify-between items-center no-print">
                        <div className="text-white font-black text-sm uppercase">Gestão Operacional</div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-white p-2">
                            <LucideIcon name={isMobileMenuOpen ? "x" : "menu"} />
                        </button>
                    </div>

                    {/* Sidebar Principal */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-950 transition-transform md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} no-print`}>
                        <div className="p-8 h-full flex flex-col">
                            <div className="flex items-center gap-3 mb-12 text-white">
                                <div className="bg-red-800 p-2 rounded-lg"><LucideIcon name="arrow-right-left" /></div>
                                <span className="font-black text-lg tracking-tighter">GESTÃO</span>
                            </div>
                            
                            <nav className="flex-1 space-y-3">
                                {[
                                    { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                                    { id: 'input', label: 'Lançar Dados', icon: 'plus-circle' },
                                    { id: 'meta', label: 'Metas', icon: 'target' },
                                    { id: 'calculadora', label: 'Calculadora HC', icon: 'calculator' }
                                ].map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => {setActiveTab(item.id); setIsMobileMenuOpen(false);}}
                                        className={`w-full flex items-center gap-4 p-4 rounded-2xl font-bold text-sm transition-all ${activeTab === item.id ? 'bg-red-800 text-white shadow-xl shadow-red-900/20' : 'text-slate-500 hover:bg-slate-900 hover:text-white'}`}
                                    >
                                        <LucideIcon name={item.icon} /> {item.label}
                                    </button>
                                ))}
                            </nav>

                            <button onClick={() => setIsAuthenticated(false)} className="mt-auto flex items-center gap-3 p-4 text-red-500 font-black text-[10px] uppercase tracking-widest hover:bg-red-500/10 rounded-xl transition-all">
                                <LucideIcon name="log-out" size={16} /> Sair do Sistema
                            </button>
                        </div>
                    </aside>

                    {/* Área de Conteúdo */}
                    <main className="flex-1 p-6 md:p-12 max-w-[1200px] mx-auto w-full">
                        <header className="mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tight">{activeTab}</h1>
                                <p className="text-slate-400 text-sm font-medium italic">Operação Logística • CDTO</p>
                            </div>
                            <button onClick={() => window.print()} className="bg-blue-900 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 shadow-lg no-print">
                                <LucideIcon name="printer" size={16} /> PDF Relatório
                            </button>
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm text-center relative overflow-hidden group">
                                    <div className="relative z-10">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Volume Acumulado</p>
                                        <p className="text-6xl font-black text-slate-900">{totalPecas.toLocaleString()}</p>
                                        <p className="text-xs font-bold text-slate-400 mt-2 uppercase">Unidades Processadas</p>
                                    </div>
                                    <LucideIcon name="database" size={100} className="absolute -right-5 -bottom-5 text-slate-50 opacity-50" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {/* Gráfico Conferente */}
                                    <div className="bg-white p-8 rounded-[2rem] border-l-8 border-blue-900 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-xs uppercase text-blue-900">Produtividade Conferente</h3>
                                            <span className="bg-blue-50 text-blue-900 px-3 py-1 rounded-full text-[10px] font-black">Meta: {metas.CONFERENTE}</span>
                                        </div>
                                        <div className="h-64">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={data.atual}>
                                                    <XAxis dataKey="dia" hide />
                                                    <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                                    <Bar dataKey={(d) => calculateProdReal(d.pecas, d.conferentes, d.jornada)} fill="#1E3A8A" radius={[6, 6, 0, 0]} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    {/* Gráfico Auxiliar */}
                                    <div className="bg-white p-8 rounded-[2rem] border-l-8 border-red-800 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-xs uppercase text-red-800">Produtividade Auxiliar</h3>
                                            <span className="bg-red-50 text-red-800 px-3 py-1 rounded-full text-[10px] font-black">Meta: {metas.AUXILIAR}</span>
                                        </div>
                                        <div className="h-64">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={data.atual}>
                                                    <XAxis dataKey="dia" hide />
                                                    <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                                    <Bar dataKey={(d) => calculateProdReal(d.pecas, d.auxiliares, d.jornada)} fill="#991B1B" radius={[6, 6, 0, 0]} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-xl print-card">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead className="bg-slate-50 border-b border-slate-100">
                                            <tr className="text-[10px] font-black uppercase text-slate-400">
                                                <th className="p-6">Dia da Semana</th>
                                                <th className="p-6 text-center">Volume (Pç)</th>
                                                <th className="p-6 text-center">Jornada (H)</th>
                                                <th className="p-6 text-center text-blue-900">Qtd Conf.</th>
                                                <th className="p-6 text-center text-red-800">Qtd Aux.</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {data.atual.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="p-6 font-black text-xs text-slate-500 uppercase">{item.dia}</td>
                                                    <td className="p-6">
                                                        <input type="number" value={item.pecas || ''} className="w-full p-3 bg-slate-100 rounded-xl text-center font-black text-slate-800 no-print" 
                                                        onChange={(e) => setData({...data, atual: data.atual.map(x => x.id === item.id ? {...x, pecas: parseInt(e.target.value) || 0} : x)})} />
                                                        <span className="hidden print:block text-center font-bold">{item.pecas}</span>
                                                    </td>
                                                    <td className="p-6">
                                                        <input type="number" step="0.5" value={item.jornada || ''} className="w-full p-3 bg-amber-50 rounded-xl text-center font-black text-amber-800 no-print" 
                                                        onChange={(e) => setData({...data, atual: data.atual.map(x => x.id === item.id ? {...x, jornada: parseFloat(e.target.value) || 0} : x)})} />
                                                        <span className="hidden print:block text-center font-bold">{item.jornada}h</span>
                                                    </td>
                                                    <td className="p-6">
                                                        <input type="number" value={item.conferentes || ''} className="w-full p-3 bg-blue-50 rounded-xl text-center font-black text-blue-900 no-print" 
                                                        onChange={(e) => setData({...data, atual: data.atual.map(x => x.id === item.id ? {...x, conferentes: parseInt(e.target.value) || 0} : x)})} />
                                                        <span className="hidden print:block text-center font-bold">{item.conferentes}</span>
                                                    </td>
                                                    <td className="p-6">
                                                        <input type="number" value={item.auxiliares || ''} className="w-full p-3 bg-red-50 rounded-xl text-center font-black text-red-900 no-print" 
                                                        onChange={(e) => setData({...data, atual: data.atual.map(x => x.id === item.id ? {...x, auxiliares: parseInt(e.target.value) || 0} : x)})} />
                                                        <span className="hidden print:block text-center font-bold">{item.auxiliares}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'calculadora' && (
                            <div className="bg-white p-8 md:p-12 rounded-[3rem] border border-slate-200 shadow-2xl">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                                    <div className="space-y-8">
                                        <div>
                                            <h2 className="text-2xl font-black uppercase text-slate-800">Cálculo de <span className="text-red-800">Headcount</span></h2>
                                            <p className="text-slate-400 text-sm mt-1">Simule a equipe necessária para o volume planejado.</p>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Volume de Peças</label>
                                                <input type="number" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xl outline-none focus:border-blue-900 transition-all" value={calcData.pecas} onChange={(e) => setCalcData({...calcData, pecas: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Horas de Operação</label>
                                                <input type="number" step="0.5" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xl outline-none focus:border-amber-600 transition-all" value={calcData.jornada} onChange={(e) => setCalcData({...calcData, jornada: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="bg-blue-900 p-8 rounded-[2rem] text-white shadow-xl">
                                            <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Conferentes Necessários</p>
                                            <p className="text-6xl font-black tracking-tighter">{calculateSugerido(calcData.pecas, calcData.jornada, metas.CONFERENTE)}</p>
                                            <p className="text-[10px] font-bold mt-2 uppercase">Base: {metas.CONFERENTE} pç/h</p>
                                        </div>
                                        <div className="bg-red-800 p-8 rounded-[2rem] text-white shadow-xl text-right">
                                            <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Auxiliares Necessários</p>
                                            <p className="text-6xl font-black tracking-tighter">{calculateSugerido(calcData.pecas, calcData.jornada, metas.AUXILIAR)}</p>
                                            <p className="text-[10px] font-bold mt-2 uppercase">Base: {metas.AUXILIAR} pç/h</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'meta' && (
                            <div className="bg-slate-950 p-10 md:p-16 rounded-[3rem] text-white text-center shadow-2xl">
                                <LucideIcon name="settings-2" size={40} className="text-red-700 mx-auto mb-6" />
                                <h2 className="text-xl font-black uppercase tracking-widest mb-10">Ajustar Metas de Operação</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-2xl mx-auto text-left">
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em] ml-1">Meta Conferente (Pç/h)</label>
                                        <input type="number" className="w-full bg-slate-900 p-6 rounded-2xl text-3xl font-black text-blue-500 outline-none focus:ring-4 focus:ring-blue-900/50" value={metas.CONFERENTE} onChange={(e) => setMetas({...metas, CONFERENTE: parseInt(e.target.value) || 0})} />
                                    </div>
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em] ml-1">Meta Auxiliar (Pç/h)</label>
                                        <input type="number" className="w-full bg-slate-900 p-6 rounded-2xl text-3xl font-black text-red-600 outline-none focus:ring-4 focus:ring-red-900/50" value={metas.AUXILIAR} onChange={(e) => setMetas({...metas, AUXILIAR: parseInt(e.target.value) || 0})} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
